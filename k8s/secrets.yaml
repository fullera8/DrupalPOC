# =============================================================================
# Secrets — Database Credentials
# =============================================================================
# WARNING: This file contains PLACEHOLDER values. Replace before applying!
#
# For POC convenience, secrets are defined as YAML with stringData (plain text).
# Kubernetes auto-encodes to base64 when stored. In production, use Azure Key
# Vault with the CSI Secrets Store Driver instead.
#
# ALTERNATIVE: Create secrets via kubectl (no passwords in YAML files):
#
#   # GHCR Image Pull Secret (required for all pods)
#   kubectl create secret docker-registry ghcr-secret \
#     --namespace=drupalpoc \
#     --docker-server=ghcr.io \
#     --docker-username=fullera8 \
#     --docker-password=<GITHUB_PAT> \
#     --docker-email=<YOUR_EMAIL>
#
#   # Azure SQL Connection String (.NET API)
#   kubectl create secret generic api-secrets \
#     --namespace=drupalpoc \
#     --from-literal=ConnectionStrings__DefaultConnection="Server=<SQL_HOST>;Database=<DB_NAME>;User Id=<USERNAME>;Password=<PASSWORD>;Encrypt=True;TrustServerCertificate=False;"
#
#   # Azure MySQL Credentials (Drupal)
#   kubectl create secret generic drupal-secrets \
#     --namespace=drupalpoc \
#     --from-literal=DRUPAL_DB_HOST=<MYSQL_HOST> \
#     --from-literal=DRUPAL_DB_PORT=3306 \
#     --from-literal=DRUPAL_DB_NAME=drupal \
#     --from-literal=DRUPAL_DB_USER=<USERNAME> \
#     --from-literal=DRUPAL_DB_PASSWORD=<PASSWORD> \
#     --from-literal=DRUPAL_HASH_SALT=$(openssl rand -hex 32)
# =============================================================================

---
# .NET 8 Web API — Azure SQL Server connection string
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  namespace: drupalpoc
  labels:
    app: api
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: "REPLACE_ME"
  GoPhish__ApiKey: "REPLACE_ME"

---
# Drupal 11 — Azure MySQL credentials
# These map directly to the env vars in docker/drupal/settings.php
apiVersion: v1
kind: Secret
metadata:
  name: drupal-secrets
  namespace: drupalpoc
  labels:
    app: drupal
type: Opaque
stringData:
  DRUPAL_DB_HOST: "REPLACE_ME"
  DRUPAL_DB_PORT: "REPLACE_ME"
  DRUPAL_DB_NAME: "drupal"
  DRUPAL_DB_USER: "REPLACE_ME"
  DRUPAL_DB_PASSWORD: "REPLACE_ME"
  DRUPAL_HASH_SALT: "REPLACE_ME"

---
# GoPhish — Azure MySQL credentials
# Used by the GoPhish init container to inject the DB password into config.json
apiVersion: v1
kind: Secret
metadata:
  name: gophish-secrets
  namespace: drupalpoc
  labels:
    app: gophish
type: Opaque
stringData:
  GOPHISH_DB_PASSWORD: "REPLACE_ME"
