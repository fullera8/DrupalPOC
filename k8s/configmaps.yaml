# =============================================================================
# ConfigMaps
# =============================================================================

---
# Drupal Nginx Sidecar — overrides fastcgi_pass for K8s pod networking
#
# The baked-in nginx.conf uses `fastcgi_pass drupal:9000` (Docker Compose).
# In a K8s sidecar pod, both containers share the same network namespace,
# so PHP-FPM is reachable at 127.0.0.1:9000 (localhost).
apiVersion: v1
kind: ConfigMap
metadata:
  name: drupal-nginx-conf
  namespace: drupalpoc
  labels:
    app: drupal
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        root /var/www/html/web;
        index index.php;

        # Drupal front-controller pattern
        location / {
            try_files $uri /index.php?$query_string;
        }

        # PHP-FPM handler — sidecar at 127.0.0.1:9000 (shared pod network)
        location ~ \.php$ {
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_read_timeout 300;
            fastcgi_buffers 16 16k;
            fastcgi_buffer_size 32k;
        }

        # Security: block hidden files and sensitive paths
        location ~ /\.ht { deny all; }
        location ~ /\.git { deny all; }
        location = /favicon.ico { log_not_found off; access_log off; }
        location = /robots.txt { allow all; log_not_found off; access_log off; }

        # Serve static files directly; fall back to PHP for Drupal's
        # lazy CSS/JS aggregation (files generated on first request)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|mp4|webm)$ {
            try_files $uri /index.php?$query_string;
            expires 1y;
            add_header Cache-Control "public, immutable";
            log_not_found off;
        }

        # Health check for Kubernetes probes
        location /healthz {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        # Block direct access to private files and config
        location ~ ^/sites/.*/private/ { deny all; }
        location ~* \.(yml|twig|info)$ { deny all; }

        client_max_body_size 64M;
    }

---
# Angular SPA — placeholder page until Day 4 build
apiVersion: v1
kind: ConfigMap
metadata:
  name: angular-placeholder
  namespace: drupalpoc
  labels:
    app: angular
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>TSUS Security Awareness Training</title>
      <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
               display: flex; justify-content: center; align-items: center;
               min-height: 100vh; margin: 0; background: #f5f5f5; color: #333; }
        .card { background: white; padding: 3rem; border-radius: 12px;
                box-shadow: 0 2px 12px rgba(0,0,0,0.1); text-align: center; max-width: 500px; }
        h1 { margin: 0 0 0.5rem; font-size: 1.5rem; }
        .badge { display: inline-block; background: #501214; color: white;
                 padding: 0.25rem 0.75rem; border-radius: 4px; font-size: 0.85rem; margin-top: 1rem; }
        p { color: #666; line-height: 1.6; }
      </style>
    </head>
    <body>
      <div class="card">
        <h1>TSUS Security Awareness Training</h1>
        <p>The Angular SPA will be deployed here on Day 4.<br>
           Microservice architecture is live on AKS.</p>
        <span class="badge">POC — March 2026</span>
      </div>
    </body>
    </html>

---
# GoPhish — config.json template for Azure MySQL
# The GOPHISH_DB_PASSWORD placeholder is replaced at pod startup by the init
# container using the value from the gophish-secrets Secret.
apiVersion: v1
kind: ConfigMap
metadata:
  name: gophish-config
  namespace: drupalpoc
  labels:
    app: gophish
data:
  config.json: |
    {
      "admin_server": {
        "listen_url": "0.0.0.0:3333",
        "use_tls": true,
        "cert_path": "gophish_admin.crt",
        "key_path": "gophish_admin.key"
      },
      "phish_server": {
        "listen_url": "0.0.0.0:8080",
        "use_tls": false
      },
      "db_name": "mysql",
      "db_path": "gophish:GOPHISH_DB_PASSWORD@tcp(drupalpoc-mysql.mysql.database.azure.com:3306)/gophish?charset=utf8&parseTime=True&loc=UTC&tls=skip-verify",
      "migrations_prefix": "db/db_"
    }
