# =============================================================================
# GoPhish — Deployment + Service
# =============================================================================
# Phishing simulation engine with REST API + click tracking.
# Ports: 3333 (admin UI, HTTPS w/ self-signed cert), 8080 (phish listener)
# Data:  Azure MySQL (persistent)
#
# Access admin UI via port-forward (not exposed through ingress):
#   kubectl port-forward -n drupalpoc svc/gophish-service 3333:3333
#   Open: https://localhost:3333
#   Default creds: admin / <printed in pod logs on first start>
#   Check logs: kubectl logs -n drupalpoc deployment/gophish
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gophish
  namespace: drupalpoc
  labels:
    app: gophish
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gophish
  template:
    metadata:
      labels:
        app: gophish
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      # Init container: inject DB password from Secret into config.json template
      initContainers:
        - name: config-inject
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              sed "s/GOPHISH_DB_PASSWORD/${GOPHISH_DB_PASSWORD}/g" \
                /config-template/config.json > /opt/gophish-config/config.json
              echo "config.json injected with credentials"
          env:
            - name: GOPHISH_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gophish-secrets
                  key: GOPHISH_DB_PASSWORD
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: gophish-config-vol
              mountPath: /opt/gophish-config
      containers:
        - name: gophish
          image: ghcr.io/fullera8/drupalpoc-gophish:latest
          ports:
            - containerPort: 3333
              name: admin
            - containerPort: 8080
              name: phish
          volumeMounts:
            - name: gophish-config-vol
              mountPath: /opt/gophish/config.json
              subPath: config.json
          # GoPhish admin uses HTTPS with self-signed cert — use TCP probe
          livenessProbe:
            tcpSocket:
              port: 3333
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 3333
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
      volumes:
        - name: config-template
          configMap:
            name: gophish-config
        - name: gophish-config-vol
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: gophish-service
  namespace: drupalpoc
  labels:
    app: gophish
spec:
  selector:
    app: gophish
  ports:
    - name: admin
      port: 3333
      targetPort: 3333
      protocol: TCP
    - name: phish
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
