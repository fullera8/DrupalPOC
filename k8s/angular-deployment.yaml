# =============================================================================
# Angular SPA — Deployment + Service
# =============================================================================
# Built Angular 21 app with Dashboard, Training Modules, Quiz, Results,
# GoPhish campaign integration. Served by Nginx.
# Image: ghcr.io/fullera8/drupalpoc-angular:latest
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: angular
  namespace: drupalpoc
  labels:
    app: angular
spec:
  replicas: 1
  selector:
    matchLabels:
      app: angular
  template:
    metadata:
      labels:
        app: angular
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: angular
          image: ghcr.io/fullera8/drupalpoc-angular:latest
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi

---
apiVersion: v1
kind: Service
metadata:
  name: angular-service
  namespace: drupalpoc
  labels:
    app: angular
spec:
  selector:
    app: angular
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP
