server {
    listen 80;
    server_name _;

    root /var/www/html/web;
    index index.php;

    # Drupal front-controller pattern
    location / {
        try_files $uri /index.php?$query_string;
    }

    # PHP-FPM handler — proxy .php requests to the drupal container
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass drupal:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Block access to hidden files and Drupal-specific paths
    location ~ /\.ht {
        deny all;
    }

    location ~ /\.git {
        deny all;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
    }

    # Serve static files directly; fall back to PHP for Drupal's
    # lazy CSS/JS aggregation (files generated on first request)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|mp4|webm)$ {
        try_files $uri /index.php?$query_string;
        expires 1y;
        add_header Cache-Control "public, immutable";
        log_not_found off;
    }

    # Health check for Kubernetes probes
    location /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Drupal private files — block direct access
    location ~ ^/sites/.*/private/ {
        deny all;
    }

    # Block access to .yml/.twig/.info files
    location ~* \.(yml|twig|info)$ {
        deny all;
    }

    client_max_body_size 64M;
}
